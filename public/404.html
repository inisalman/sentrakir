<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting...</title>
  <script>
    // GitHub Pages SPA redirect - keep the path and redirect to index.html
    var path = window.location.pathname;
    var search = window.location.search;
    window.location.replace('/' + path.replace(/^\//, '') + search + window.location.hash);
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
